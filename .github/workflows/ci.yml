name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.13"
        enable-cache: true

    - name: Install dependencies (exact, hash-verified from uv.lock)
      run: uv sync --frozen --extra dev

    - name: Lint and format with ruff
      run: |
        uv run ruff check src/
        uv run ruff format --check src/

    - name: Lint HTML templates with djLint
      run: uv run djlint templates/ --check

    - name: Audit dependencies for known CVEs
      run: uv run --with pip-audit pip-audit

    - name: Run tests with pytest
      run: uv run pytest -v --tb=short

    - name: Check test coverage
      run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80
