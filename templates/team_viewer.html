<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fantasy Football Draft Set — viewer showcase of rosters and draft status">
    <meta name="keywords" content="fantasy football, draft set, viewer, auction draft, rosters">
    <title>Draft Set — Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/draft-set-viewer.css">
  </head>
  <body>
    <div id="app">
      <div class="vtop">
        <div class="wordmark"><span class="yr cond">DRAFT</span><span class="tag">'25</span><span class="vsub">Viewer</span></div>
        <div class="seg">
          <button id="seg-teams" class="active" onclick="showView('teams')">Teams</button>
          <button id="seg-status" onclick="showView('status')">Draft Status</button>
        </div>
        <div class="spacer"></div>
        <div class="clocknote" id="clocknote"></div>
        <div class="completion"><span class="lbl">Complete</span><div class="track"><div class="fill" id="completion-fill"></div></div><span class="pct tnum" id="completion-pct">0%</span></div>
      </div>

      <div class="teamstrip" id="teamstrip">
        <button class="stripnav" onclick="navTeam(-1)" title="Previous team">‹</button>
        <div class="chips" id="chips"></div>
        <button class="stripnav" onclick="navTeam(1)" title="Next team">›</button>
      </div>

      <div class="view active" id="view-teams">
        <div class="identity" id="identity"></div>
        <div class="panel" id="rosterpanel"><div class="roster-scroll"><div class="roster-grid" id="roster"></div></div></div>
        <div id="rail">
          <div class="rcard target-card"><h3>My Target Board</h3>
            <div class="tb-search-wrap"><input class="tb-search" id="tbSearch" placeholder="Search available players…" autocomplete="off"><div class="tb-results" id="tbResults"></div></div>
            <div class="tb-targets" id="tbTargets"></div>
            <div class="tb-note">Private to this browser — saved locally, never shared, and it does not draft or bid for you.</div>
          </div>
          <div class="rcard breakdown"><h3>Roster Completion</h3>
            <div class="radar-wrap" id="radarwrap"></div></div>
        </div>
      </div>

      <div class="view" id="view-status">
        <div class="status-body">
          <div class="sg">
            <div class="rcard la-card"><h3>Live Auction</h3>
              <div id="liveAuction"></div></div>
            <div class="rcard cost-card"><div class="cost-head"><h3>Positional Cost · Draft Timeline</h3>
              <div class="cost-legend" id="costLegend"></div></div><div class="cost-wrap" id="costChart"></div></div>
            <div class="rcard dom-card"><h3>Position Dominance</h3>
              <div class="dom-list" id="dominance"></div></div>
            <div class="rcard bp-card"><h3>Budget Power · Remaining</h3>
              <div id="budgetPower"></div></div>
            <div class="rcard rp-card"><h3>Recent Picks</h3>
              <div class="rp-list" id="recentPicks"></div></div>
          </div>
        </div>
      </div>
    </div>
    <div id="ptip"></div>
    <div id="vError" class="tb-empty verror-toast"></div>
    <script>
        const API_BASE = '/api/v1';
        // Server-injected (change F): config is authoritative; no hardcoded fallback.
        const config = {{ config | tojson }};
        const TOTAL = config.total_rounds;
        const INITIAL = config.initial_budget;
        const POSMAX = config.position_maximums;            // {QB,RB,WR,TE,K,"D/ST"}
        const RADAR_ORDER = ['QB','RB','WR','TE','K','D/ST'];
        const POSORDER = {QB:0,RB:1,WR:2,TE:3,K:4,'D/ST':5};
        const POSCOLOR = {QB:'#A877DE',RB:'#46B86C',WR:'#5790CF',TE:'#E08A45',K:'#E6B23E','D/ST':'#D6564A'};
        const LIGHTPOS = {QB:1,WR:1,'D/ST':1};
        const STATMAX = {YDS:5000,TD:30,INT:20,RUSH:2100,REC:130,FG:40,XP:60,PTS:170,SACK:60};

        let owners = [], ownersById = {}, playersById = {}, playerStats = {};
        let TEAMS = [];                 // normalized model (mockup shape)
        let lastDraftState = null;
        let selected = 0;               // index into TEAMS
        let curRoster = [], prevFrac = [0,0,0,0,0,0];
        let lastSeenMaxPickId = 0;      // for recent-picks animation
        const INITIAL_TEAM_ID = {{ selected_team_id }};
        let AVAILABLE = [];

        // NFL Team Logo URLs - using ESPN's CDN
        function getTeamLogoUrl(teamAbbr) {
            const teamMappings = {
                'ARI': 'https://a.espncdn.com/i/teamlogos/nfl/500/ari.png',
                'ATL': 'https://a.espncdn.com/i/teamlogos/nfl/500/atl.png',
                'BAL': 'https://a.espncdn.com/i/teamlogos/nfl/500/bal.png',
                'BUF': 'https://a.espncdn.com/i/teamlogos/nfl/500/buf.png',
                'CAR': 'https://a.espncdn.com/i/teamlogos/nfl/500/car.png',
                'CHI': 'https://a.espncdn.com/i/teamlogos/nfl/500/chi.png',
                'CIN': 'https://a.espncdn.com/i/teamlogos/nfl/500/cin.png',
                'CLE': 'https://a.espncdn.com/i/teamlogos/nfl/500/cle.png',
                'DAL': 'https://a.espncdn.com/i/teamlogos/nfl/500/dal.png',
                'DEN': 'https://a.espncdn.com/i/teamlogos/nfl/500/den.png',
                'DET': 'https://a.espncdn.com/i/teamlogos/nfl/500/det.png',
                'GB': 'https://a.espncdn.com/i/teamlogos/nfl/500/gb.png',
                'HOU': 'https://a.espncdn.com/i/teamlogos/nfl/500/hou.png',
                'IND': 'https://a.espncdn.com/i/teamlogos/nfl/500/ind.png',
                'JAX': 'https://a.espncdn.com/i/teamlogos/nfl/500/jax.png',
                'KC': 'https://a.espncdn.com/i/teamlogos/nfl/500/kc.png',
                'LV': 'https://a.espncdn.com/i/teamlogos/nfl/500/lv.png',
                'LAC': 'https://a.espncdn.com/i/teamlogos/nfl/500/lac.png',
                'LAR': 'https://a.espncdn.com/i/teamlogos/nfl/500/lar.png',
                'MIA': 'https://a.espncdn.com/i/teamlogos/nfl/500/mia.png',
                'MIN': 'https://a.espncdn.com/i/teamlogos/nfl/500/min.png',
                'NE': 'https://a.espncdn.com/i/teamlogos/nfl/500/ne.png',
                'NO': 'https://a.espncdn.com/i/teamlogos/nfl/500/no.png',
                'NYG': 'https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png',
                'NYJ': 'https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png',
                'PHI': 'https://a.espncdn.com/i/teamlogos/nfl/500/phi.png',
                'PIT': 'https://a.espncdn.com/i/teamlogos/nfl/500/pit.png',
                'SF': 'https://a.espncdn.com/i/teamlogos/nfl/500/sf.png',
                'SEA': 'https://a.espncdn.com/i/teamlogos/nfl/500/sea.png',
                'TB': 'https://a.espncdn.com/i/teamlogos/nfl/500/tb.png',
                'TEN': 'https://a.espncdn.com/i/teamlogos/nfl/500/ten.png',
                'WAS': 'https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png'
            };
            
            return teamMappings[teamAbbr] || `https://a.espncdn.com/i/teamlogos/nfl/500/${teamAbbr.toLowerCase()}.png`;
        }

        const headshot = id => `https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/players/full/${id}.png&w=350&h=254`;
        const logoUrl = abbr => getTeamLogoUrl(abbr);
        function hexA(hex, a){ const n = parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
        function median(a){ const s=[...a].sort((x,y)=>x-y), m=s.length>>1; return s.length? (s.length%2? s[m] : (s[m-1]+s[m])/2) : 0; }
        function ab2(n){ return (n||'').slice(0,2).toUpperCase(); }
        const budgetClass = b => { const p = b/INITIAL*100; return p<=15?'crit':p<=35?'warn':'ok'; };
        // D/ST headshot falls back to the team logo (no player headshot for defenses).
        const shotImg = (p, cls) => p.pos === 'D/ST'
            ? `<img class="${cls} logo" src="${logoUrl(p.nfl)}" alt="">`
            : `<img class="${cls}" src="${headshot(p.id)}" alt="">`;
        function defenseBye(teamAbbr){
            for (const id in playerStats){ const s = playerStats[id]; if (s && s.team === teamAbbr && s.bye_week) return s.bye_week; }
            return null;
        }

        async function loadStatic() {
            owners = await (await fetch(`${API_BASE}/owners`)).json();
            ownersById = Object.fromEntries(owners.map(o => [o.id, o]));
            const players = await (await fetch(`${API_BASE}/players`)).json();
            playersById = Object.fromEntries(players.map(p => [p.id, p]));
            try {
                const r = await fetch(`${API_BASE}/player/stats`);
                if (r.ok) playerStats = await r.json();
            } catch (e) { playerStats = {}; }
        }
        async function loadAvailable() {
            try {
                const list = await (await fetch(`${API_BASE}/players/available`)).json();
                AVAILABLE = list.map(p => ({ id: p.id, fn: p.first_name, ln: p.last_name, pos: p.position, nfl: p.team }));
            } catch (e) { AVAILABLE = []; }
        }

        // Normalize the live draft state into the array shape the mockup renderers expect.
        // Each entry: {ord, owner_id, team, owner, budget, picks (count), color, status, max_bid, _picks}
        function buildModel(ds) {
            const sorted = [...ds.teams].sort((a, b) => a.owner_id - b.owner_id);
            TEAMS = sorted.map((t, i) => {
                const o = ownersById[t.owner_id] || {};
                let status = '';
                if (t.manually_done || t.picks.length >= TOTAL) status = 'done';
                else if (t.owner_id === ds.next_to_nominate) status = 'clock';
                return {
                    ord: i + 1, owner_id: t.owner_id,
                    team: o.team_name || 'Unknown', owner: o.owner_name || '',
                    budget: t.budget_remaining, picks: t.picks.length,
                    color: o.color || '#E0A24A',
                    max_bid: t.max_bid, status, _picks: t.picks
                };
            });
        }
        // Indices for "On the Clock" / "Up Next", driven by the server (not re-derived).
        function clockInfo() {
            const clockIdx = lastDraftState ? TEAMS.findIndex(t => t.owner_id === lastDraftState.next_to_nominate) : -1;
            const nextIdx = (lastDraftState && lastDraftState.up_next)
                ? TEAMS.findIndex(t => t.owner_id === lastDraftState.up_next) : -1;
            return { clockIdx, nextIdx };
        }
        const isDone = t => t.status === 'done';
        const maxBid = t => t.max_bid;   // server-authoritative (— when null)

        function getStatTooltip(label) {
            const tooltips = {
                // Passing
                'Comp': 'Completions',
                'Att': 'Pass Attempts',
                'Yds': 'Passing Yards',
                'TD': 'Passing Touchdowns',
                'INT': 'Interceptions',
                '%': 'Completion Percentage',
                'Rate': 'Passer Rating',
                'Sacks': 'Times Sacked',
                
                // Rushing
                'Car': 'Carries',
                'RYds': 'Rushing Yards',
                'RTD': 'Rushing Touchdowns',
                'Avg': 'Yards per Carry',
                'Long': 'Longest Run',
                'Fum': 'Fumbles',
                
                // Receiving
                'Rec': 'Receptions',
                'RecYds': 'Receiving Yards',
                'RecTD': 'Receiving Touchdowns',
                'Tgt': 'Targets',
                
                // Kicking
                'FGM': 'Field Goals Made',
                'FGA': 'Field Goals Attempted',
                'XPM': 'Extra Points Made',
                'XPA': 'Extra Points Attempted',
                'Pts': 'Total Points Scored'
            };
            
            return tooltips[label] || label;
        }
        
        function formatPlayerStats(playerId) {
            // Very defensive - handle any missing data gracefully
            try {
                const stats = playerStats[playerId];
                if (!stats) {
                    return ''; // Just show nothing if no stats available
                }

                let statColumns = [];
                
                // Show ALL available stats based on position
                if (stats.position === 'QB') {
                    // QB passing stats
                    if (stats.passing) {
                        const p = stats.passing;
                        statColumns.push({
                            label: 'Comp',
                            value: p.completions,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: 'Att',
                            value: p.attempts,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: 'Yds',
                            value: p.yards,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: 'TD',
                            value: p.tds,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: 'INT',
                            value: p.ints,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: '%',
                            value: p.pct,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: 'Rate',
                            value: p.rating,
                            type: 'passing'
                        });
                        statColumns.push({
                            label: 'Sacks',
                            value: p.sacks,
                            type: 'passing'
                        });
                    }
                    
                    // QB rushing stats (if any)
                    if (stats.rushing && parseInt(stats.rushing.carries) > 0) {
                        if (statColumns.length > 0) statColumns.push({ separator: true });
                        const r = stats.rushing;
                        statColumns.push({
                            label: 'Car',
                            value: r.carries,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'RYds',
                            value: r.yards,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'RTD',
                            value: r.tds,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Avg',
                            value: r.avg,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Long',
                            value: r.long,
                            type: 'rushing'
                        });
                    }
                    
                } else if (stats.position === 'RB') {
                    // RB rushing stats
                    if (stats.rushing) {
                        const r = stats.rushing;
                        statColumns.push({
                            label: 'Car',
                            value: r.carries,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Yds',
                            value: r.yards,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'TD',
                            value: r.tds,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Avg',
                            value: r.avg,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Long',
                            value: r.long,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Fum',
                            value: r.fumbles,
                            type: 'rushing'
                        });
                    }
                    
                    // RB receiving stats
                    if (stats.receiving && parseInt(stats.receiving.receptions) > 0) {
                        if (statColumns.length > 0) statColumns.push({ separator: true });
                        const rec = stats.receiving;
                        statColumns.push({
                            label: 'Rec',
                            value: rec.receptions,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'RecYds',
                            value: rec.yards,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'RecTD',
                            value: rec.tds,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Tgt',
                            value: rec.targets,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Avg',
                            value: rec.avg,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Long',
                            value: rec.long,
                            type: 'receiving'
                        });
                    }
                    
                } else if (stats.position === 'WR' || stats.position === 'TE') {
                    // WR/TE receiving stats
                    if (stats.receiving) {
                        const rec = stats.receiving;
                        statColumns.push({
                            label: 'Rec',
                            value: rec.receptions,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Yds',
                            value: rec.yards,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'TD',
                            value: rec.tds,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Tgt',
                            value: rec.targets,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Avg',
                            value: rec.avg,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Long',
                            value: rec.long,
                            type: 'receiving'
                        });
                        statColumns.push({
                            label: 'Fum',
                            value: rec.fumbles,
                            type: 'receiving'
                        });
                    }
                    
                    // WR rushing stats (if any)
                    if (stats.position === 'WR' && stats.rushing && parseInt(stats.rushing.carries) > 0) {
                        if (statColumns.length > 0) statColumns.push({ separator: true });
                        const r = stats.rushing;
                        statColumns.push({
                            label: 'Car',
                            value: r.carries,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'RYds',
                            value: r.yards,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'RTD',
                            value: r.tds,
                            type: 'rushing'
                        });
                        statColumns.push({
                            label: 'Avg',
                            value: r.avg,
                            type: 'rushing'
                        });
                    }
                    
                } else if (stats.position === 'K') {
                    // Kicker stats
                    if (stats.kicking) {
                        const k = stats.kicking;
                        statColumns.push({
                            label: 'FGM',
                            value: k.fgm,
                            type: 'kicking'
                        });
                        statColumns.push({
                            label: 'FGA',
                            value: k.fga,
                            type: 'kicking'
                        });
                        statColumns.push({
                            label: 'XPM',
                            value: k.xpm,
                            type: 'kicking'
                        });
                        statColumns.push({
                            label: 'XPA',
                            value: k.xpa,
                            type: 'kicking'
                        });
                        statColumns.push({
                            label: 'Pts',
                            value: k.points,
                            type: 'kicking'
                        });
                        statColumns.push({
                            label: '%',
                            value: k.fg_pct,
                            type: 'kicking'
                        });
                        statColumns.push({
                            label: 'Long',
                            value: k.long,
                            type: 'kicking'
                        });
                    }
                }
                
                if (statColumns.length === 0) {
                    return '';
                }
                
                // Generate table structure
                let labelRow = '';
                let valueRow = '';
                
                for (const col of statColumns) {
                    if (col.separator) {
                        labelRow += '<td class="stat-separator-col"></td>';
                        valueRow += '<td class="stat-separator-col"></td>';
                    } else {
                        const cssClass = `stat-${col.type}`;
                        const tooltip = getStatTooltip(col.label);
                        labelRow += `<td class="${cssClass}"><div class="stat-label" title="${tooltip}">${col.label}</div></td>`;
                        valueRow += `<td class="${cssClass}"><div class="stat-value">${col.value}</div></td>`;
                    }
                }
                
                return `<table class="stats-table">
                    <tr class="stat-label-row">${labelRow}</tr>
                    <tr class="stat-value-row">${valueRow}</tr>
                </table>`;
                
            } catch (error) {
                // If anything fails, just return empty string - don't break the UI
                console.debug('Error formatting stats for player', playerId, error);
                return '';
            }
        }

        function getDefenseByeWeek(teamAbbr) {
            // Find bye week by looking up any player from the same team
            for (const playerId in playerStats) {
                const stats = playerStats[playerId];
                if (stats && stats.team === teamAbbr && stats.bye_week) {
                    return stats.bye_week;
                }
            }
            return null; // No bye week found for this team
        }

        function formatByeWeek(byeWeek, teamAbbr) {
            if (!byeWeek || typeof byeWeek !== 'number') {
                return '';
            }
            const teamLogoUrl = getTeamLogoUrl(teamAbbr);
            return `<div class="bye-week-column" style="background-image: url('${teamLogoUrl}')">
                <div class="bye-number">${byeWeek}</div>
            </div>`;
        }

        async function loadTeamData(teamId) {
            try {
                hideError();
                // Don't show loading for refresh updates
                
                const response = await fetch(`${API_BASE}/teams/${teamId}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Team not found or has no picks yet');
                    }
                    throw new Error('Failed to load team data');
                }
                
                const teamData = await response.json();
                displayTeamData(teamData);
                
            } catch (error) {
                showError('Failed to load team data: ' + error.message);
            }
        }

        function displayTeamData(teamData) {
            const owner = owners.find(o => o.id === teamData.owner_id);
            
            // Update team name
            document.getElementById('team-name').textContent = 
                owner ? `${owner.team_name} Roster` : 'Team Roster';
            
            // Display players
            displayPlayers(teamData.picks);
            
            // Display team summary
            displayTeamSummary(teamData, owner);
            
            // Show main content
            document.getElementById('main-content').style.display = 'grid';
        }

        function displayPlayers(picks) {
            const playerList = document.getElementById('player-list');
            
            if (!picks || picks.length === 0) {
                playerList.innerHTML = '<div class="no-players">No players drafted yet</div>';
                return;
            }
            
            // Sort picks by pick order (pick_id ascending)
            const sortedPicks = picks.sort((a, b) => {
                return a.pick.pick_id - b.pick.pick_id;
            });
            
            // Group players by position
            const positionOrder = ['QB', 'RB', 'WR', 'TE', 'K', 'D/ST'];
            const playersByPosition = {};
            
            sortedPicks.forEach(pick => {
                const position = pick.player.position;
                if (!playersByPosition[position]) {
                    playersByPosition[position] = [];
                }
                playersByPosition[position].push(pick);
            });
            
            let html = '';
            let isFirstGroup = true;
            
            positionOrder.forEach(position => {
                if (playersByPosition[position] && playersByPosition[position].length > 0) {
                    // Add separator between position groups
                    if (!isFirstGroup) {
                        html += '<div class="position-separator"></div>';
                    }
                    isFirstGroup = false;
                    
                    // Add players in this position group
                    html += playersByPosition[position].map(pick => {
                const player = pick.player;
                
                // Use team logo for defenses, player headshot for individuals
                let imageUrl;
                if (player.position === 'D/ST') {
                    imageUrl = getTeamLogoUrl(player.team);
                } else {
                    imageUrl = `https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/players/full/${player.id}.png&w=350&h=254`;
                }
                
                const teamLogoUrl = getTeamLogoUrl(player.team);
                
                // Handle bye week for defenses by looking up a player from the same team
                let byeWeek;
                if (player.position === 'D/ST') {
                    byeWeek = getDefenseByeWeek(player.team);
                } else {
                    byeWeek = playerStats[player.id]?.bye_week;
                }
                const byeWeekHtml = formatByeWeek(byeWeek, player.team);
                
                // Display "DST" instead of "D/ST" for better fit
                const displayPosition = player.position === 'D/ST' ? 'DST' : player.position;
                const cssPositionClass = player.position === 'D/ST' ? 'DST' : player.position;
                
                return `
                    <div class="player-card">
                        <div class="player-image-container">
                            <img src="${teamLogoUrl}" alt="${player.team}" class="player-image-background" title="${player.team}">
                            <img src="${imageUrl}" alt="${player.last_name}" class="player-image" onerror="this.style.display='none'">
                        </div>
                        <span class="player-position position-${cssPositionClass}">${displayPosition}</span>
                        <div class="player-info">
                            <div class="player-name">${player.first_name} ${player.last_name}</div>
                            ${byeWeekHtml}
                            <div class="player-stats">
                                ${formatPlayerStats(player.id)}
                            </div>
                        </div>
                        <div class="player-price">$${pick.pick.price}</div>
                    </div>
                `;
                    }).join('');
                }
            });
            
            playerList.innerHTML = html;
        }

        function displayTeamSummary(teamData, owner) {
            const statsDiv = document.getElementById('team-stats');
            const positionDiv = document.getElementById('position-breakdown');
            
            // Calculate position counts
            const positionCounts = {};
            teamData.picks.forEach(pick => {
                const position = pick.player.position;
                positionCounts[position] = (positionCounts[position] || 0) + 1;
            });
            
            // Team stats
            const totalSpent = teamData.picks.reduce((sum, pick) => sum + pick.pick.price, 0);
            const remainingPicks = config.total_rounds - teamData.picks.length;
            
            statsDiv.innerHTML = `
                <div class="summary-item">
                    <span class="summary-label">Owner</span>
                    <span class="summary-value">${owner ? owner.owner_name : 'Unknown'}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Budget Remaining</span>
                    <span class="summary-value budget-value">$${teamData.budget_remaining}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Total Spent</span>
                    <span class="summary-value">$${totalSpent}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Players Drafted</span>
                    <span class="summary-value">${teamData.picks.length} / ${config.total_rounds}</span>
                </div>
                <div class="summary-progress">
                    <div class="summary-progress-bar" style="width: ${(teamData.picks.length / config.total_rounds) * 100}%"></div>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Remaining Picks</span>
                    <span class="summary-value">${remainingPicks}</span>
                </div>
            `;
            
            // Position breakdown
            const positions = ['QB', 'RB', 'WR', 'TE', 'K', 'D/ST'];
            positionDiv.innerHTML = positions.map(position => {
                const current = positionCounts[position] || 0;
                const max = config.position_maximums[position] || 0;
                const percentage = max > 0 ? (current / max) * 100 : 0;
                const statusClass = current >= max ? 'at-max' : 'under-max';
                
                // Determine bar color based on fill percentage
                let barClass = 'progress-bar-normal';
                if (percentage >= 100) {
                    barClass = 'progress-bar-full';
                } else if (percentage >= 75) {
                    barClass = 'progress-bar-warning';
                }
                
                // Use same position class for consistency
                const displayPosition = position === 'D/ST' ? 'DST' : position;
                const cssPositionClass = position === 'D/ST' ? 'DST' : position;
                
                return `
                    <div class="position-item">
                        <div class="position-header">
                            <span class="position-badge position-${cssPositionClass}">${displayPosition}</span>
                            <div class="position-count ${statusClass}">${current} / ${max}</div>
                        </div>
                        <div class="position-progress">
                            <div class="position-progress-bar ${barClass}" style="width: ${Math.min(percentage, 100)}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showError(msg){ const e = document.getElementById('vError'); e.textContent = msg; e.style.display = 'block'; }
        function hideError(){ document.getElementById('vError').style.display = 'none'; }

        async function pollState() {
            try {
                const ds = await (await fetch(`${API_BASE}/draft-state`)).json();
                hideError();
                lastDraftState = ds;
                buildModel(ds);
                // Keep the selected team stable across polls (match by owner_id).
                if (TEAMS.length) {
                    if (selected >= TEAMS.length) selected = 0;
                }
                renderChrome();                         // strip + clocknote + completion (Task 3)
                if (document.getElementById('view-teams').classList.contains('active')) renderTeamsView();
                else renderStatusView();
            } catch (e) {
                showError('Connection lost — retrying…');
            }
            try { await loadAvailable(); } catch (e) {}
        }

        async function init() {
            await loadStatic();
            await loadAvailable();
            // first poll establishes TEAMS, then map the injected team id to an index
            const ds = await (await fetch(`${API_BASE}/draft-state`)).json();
            lastDraftState = ds; buildModel(ds);
            const idx = TEAMS.findIndex(t => t.owner_id === INITIAL_TEAM_ID);
            selected = idx >= 0 ? idx : 0;
            lastSeenMaxPickId = maxPickId(ds);
            renderChrome(); renderTeamsView();
            setupTargetBoard();                          // Task 7
            setInterval(pollState, 5000);
        }
        function maxPickId(ds){ let m = 0; ds.teams.forEach(t => t.picks.forEach(p => { if (p.pick_id > m) m = p.pick_id; })); return m; }

        // FOUT guard
        const app = document.getElementById('app');
        function reveal(){ app.classList.add('ready'); }
        if (document.fonts && document.fonts.ready) document.fonts.ready.then(reveal);
        setTimeout(reveal, 1500);

        function renderChips(){
          const {clockIdx,nextIdx}=clockInfo();
          document.getElementById('chips').innerHTML=TEAMS.map((t,i)=>{
            const done=isDone(t);
            const badge=i===clockIdx?'<span class="chip-badge clock">On Clock</span>'
              :done?'<span class="chip-badge done">Done</span>'
              :i===nextIdx?'<span class="chip-badge next">Next</span>':'';
            const cls=`chip ${i===selected?'active':''} ${i===clockIdx?'is-clock':''} ${done?'is-done':''}`;
            return `<div class="${cls}" style="--tc:${t.color}" onclick="selectTeam(${i})">
              <div class="ct">${t.team}</div>
              <div class="chip-foot"><span class="co">${t.owner}</span>${badge}</div></div>`;
          }).join('');
        }
        function renderClockNote(){
          const {clockIdx,nextIdx}=clockInfo();
          const c=clockIdx>=0?TEAMS[clockIdx]:null, n=nextIdx>=0?TEAMS[nextIdx]:null;
          document.getElementById('clocknote').innerHTML=
            (c?`<span class="cn-clock"><span class="cn-dot"></span>On the Clock <b>${c.team}</b></span>`:'')+
            (n?`<span class="cn-next">Up Next <b>${n.team}</b></span>`:'');
        }
        function renderChrome() {
            renderChips();
            renderClockNote();
            const drafted = TEAMS.reduce((n, t) => n + t.picks, 0);
            const pct = TEAMS.length ? Math.round(drafted / (TOTAL * TEAMS.length) * 100) : 0;
            document.getElementById('completion-fill').style.width = pct + '%';
            document.getElementById('completion-pct').textContent = pct + '%';
        }
        function selectTeam(i) {
            selected = i;
            const t = TEAMS[i];
            if (t) {
                const url = new URL(window.location);
                url.searchParams.set('team_id', t.owner_id);
                window.history.pushState({}, '', url);
            }
            renderChips();
            renderTeamsView();
        }
        function navTeam(d) {
            if (!TEAMS.length) return;
            selected = (selected + d + TEAMS.length) % TEAMS.length;
            selectTeam(selected);
            const chip = document.getElementById('chips').children[selected];
            if (chip) chip.scrollIntoView({ inline: 'center', block: 'nearest' });
        }
        document.addEventListener('keydown', e => {
            if (!document.getElementById('view-teams').classList.contains('active')) return;
            if (e.key === 'ArrowLeft') navTeam(-1);
            if (e.key === 'ArrowRight') navTeam(1);
        });

        function renderIdentity() {
            const t = TEAMS[selected], bc = budgetClass(t.budget), spent = INITIAL - t.budget;
            const el = document.getElementById('identity'); el.style.setProperty('--tc', t.color);
            el.innerHTML = `
    <div class="id-main"><div class="id-eyebrow">Managed by ${t.owner}</div><div class="id-name cond">${t.team}</div></div>
    <div class="id-stats">
      <div class="idstat"><span class="k">Budget</span><b class="v money ${bc} tnum">$${t.budget}</b><div class="mini ${bc}"><div class="f" style="width:${t.budget / INITIAL * 100}%"></div></div></div>
      <div class="idstat"><span class="k">Max Bid</span><b class="v max tnum">${t.picks >= TOTAL ? '—' : '$' + maxBid(t)}</b></div>
      <div class="idstat"><span class="k">Spent</span><b class="v tnum">$${spent}</b></div>
      <div class="idstat"><span class="k">Roster</span><b class="v tnum">${t.picks}/${TOTAL}</b><div class="mini roster"><div class="f" style="width:${t.picks / TOTAL * 100}%"></div></div></div>
    </div>`;
        }
        function renderTeamsView() {
            if (!TEAMS.length) return;
            renderIdentity();
            renderRoster();      // Task 5
            renderRail();        // Task 6 (radar)
        }
        // Map real nested player_stats into the flat keys the card/tooltip use; '–' when absent.
        function flattenStats(pos, st) {
            const o = { YDS:'–', TD:'–', INT:'–', RUSH:'–', REC:'–', FG:'–', XP:'–', PTS:'–', SACK:'–' };
            if (!st) return o;
            if (pos === 'QB' && st.passing) { o.YDS = st.passing.yards; o.TD = st.passing.tds; o.INT = st.passing.ints; }
            else if (pos === 'RB') { if (st.rushing){ o.RUSH = st.rushing.yards; o.TD = st.rushing.tds; } if (st.receiving) o.REC = st.receiving.receptions; }
            else if (pos === 'WR' || pos === 'TE') { if (st.receiving){ o.REC = st.receiving.receptions; o.YDS = st.receiving.yards; o.TD = st.receiving.tds; } }
            else if (pos === 'K' && st.kicking) { o.FG = st.kicking.fgm; o.XP = st.kicking.xpm; o.PTS = st.kicking.points; }
            return o;  // D/ST has no structured stats in the backend -> all '–'
        }
        function normPlayer(pick) {
            const pl = playersById[pick.player_id];
            if (!pl) return null;
            const st = playerStats[pl.id];
            const bye = (pl.position === 'D/ST') ? defenseBye(pl.team) : (st ? st.bye_week : null);
            return { id: pl.id, fn: pl.first_name, ln: pl.last_name, pos: pl.position, nfl: pl.team,
                     bye: bye, price: pick.price, stats: flattenStats(pl.position, st) };
        }
        function rosterFor(t) {
            return t._picks.map(normPlayer).filter(Boolean)
                .sort((a, b) => (POSORDER[a.pos] - POSORDER[b.pos]) || (b.price - a.price));
        }
        // The 3 card stat boxes per position (matches the mockup's statCells shape).
        function statCells(p) {
            if (p.pos === 'QB') return [['Yds', p.stats.YDS, STATMAX.YDS], ['TD', p.stats.TD, STATMAX.TD], ['Int', p.stats.INT, STATMAX.INT]];
            if (p.pos === 'RB') return [['Ru Yds', p.stats.RUSH, STATMAX.RUSH], ['TD', p.stats.TD, STATMAX.TD], ['Rec', p.stats.REC, STATMAX.REC]];
            if (p.pos === 'WR' || p.pos === 'TE') return [['Rec', p.stats.REC, STATMAX.REC], ['Yds', p.stats.YDS, STATMAX.YDS], ['TD', p.stats.TD, STATMAX.TD]];
            if (p.pos === 'K') return [['FG', p.stats.FG, STATMAX.FG], ['XP', p.stats.XP, STATMAX.XP], ['Pts', p.stats.PTS, STATMAX.PTS]];
            return [['Sack', p.stats.SACK, STATMAX.SACK], ['Int', p.stats.INT, STATMAX.INT], ['TD', p.stats.TD, STATMAX.TD]];
        }
        function renderRoster() {
            curRoster = rosterFor(TEAMS[selected]);
            let html = '', lastPos = null;
            curRoster.forEach((p, idx) => {
                if (p.pos !== lastPos) { html += `<div class="posgroup" style="color:${POSCOLOR[p.pos]}"><span class="dot" style="background:${POSCOLOR[p.pos]}"></span>${p.pos}<span class="ln"></span></div>`; lastPos = p.pos; }
                const cells = statCells(p).map(c => `<div class="st"><b class="tnum">${c[1]}</b><span>${c[0]}</span></div>`).join('');
                html += `<div class="pcard" style="--pc:${POSCOLOR[p.pos]}" data-idx="${idx}" onmouseenter="showTip(event,${idx})" onmousemove="moveTip(event)" onmouseleave="hideTip()">
      <div class="pc-photo">
        <img class="pc-wm" src="${logoUrl(p.nfl)}" alt="">
        ${shotImg(p, 'pc-shot')}
        <span class="pc-pos ${LIGHTPOS[p.pos] ? 'light' : ''}">${p.pos}</span>
        <span class="pc-price tnum">$${p.price}</span>
        <div class="pc-scrim"><div class="pc-name">${p.fn} ${p.ln}</div><div class="pc-sub">${p.nfl} · Bye ${p.bye}</div></div>
      </div>
      <div class="pc-stats">${cells}</div>
    </div>`;
            });
            document.getElementById('roster').innerHTML = html;
        }
        function renderRail(){
          const counts={}; curRoster.forEach(p=>counts[p.pos]=(counts[p.pos]||0)+1);
          const newFrac=RADAR_ORDER.map(pos=>Math.min((counts[pos]||0)/POSMAX[pos],1));
          document.getElementById('radarwrap').innerHTML=renderRadar(counts,TEAMS[selected].color,prevFrac);
          animateRadarTo(prevFrac.slice(),newFrac);
          prevFrac=newFrac;
        }
        const RADAR_GEO={cx:120,cy:120,rO:82,n:6};
        function radarPoint(i,frac){const{cx,cy,rO,n}=RADAR_GEO;const a=-Math.PI/2+i/n*2*Math.PI;return[cx+Math.cos(a)*frac*rO,cy+Math.sin(a)*frac*rO];}
        function renderRadar(counts,color,shapeFrac){
          const{cx,cy,rO,n}=RADAR_GEO, size=240,rings=3;
          const pt=(a,r)=>[cx+Math.cos(a)*r,cy+Math.sin(a)*r];
          let s=`<svg class="radar" viewBox="0 0 ${size} ${size}" preserveAspectRatio="xMidYMid meet">`;
          for(let ring=1;ring<=rings;ring++){const rr=rO/rings*ring;let pts=[];for(let i=0;i<n;i++){const a=-Math.PI/2+i/n*2*Math.PI;const p=pt(a,rr);pts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}s+=`<polygon class="r-grid ${ring===rings?'r-outer':''}" points="${pts.join(' ')}"/>`;}
          for(let i=0;i<n;i++){const a=-Math.PI/2+i/n*2*Math.PI;const p=pt(a,rO);s+=`<line class="r-axis" x1="${cx}" y1="${cy}" x2="${p[0].toFixed(1)}" y2="${p[1].toFixed(1)}"/>`;}
          let sp=[],dots='';
          for(let i=0;i<n;i++){const p=radarPoint(i,shapeFrac[i]);sp.push(p[0].toFixed(1)+','+p[1].toFixed(1));dots+=`<circle class="r-dot" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}"/>`;}
          s+=`<polygon class="r-shape" points="${sp.join(' ')}" style="fill:${hexA(color,.2)};stroke:${color};filter:drop-shadow(0 0 7px ${hexA(color,.55)})"/>`+dots;
          for(let i=0;i<n;i++){const pos=RADAR_ORDER[i];const a=-Math.PI/2+i/n*2*Math.PI;const p=pt(a,rO+16);let anc='middle';if(Math.cos(a)>0.4)anc='start';else if(Math.cos(a)<-0.4)anc='end';let dy=4;if(Math.sin(a)>0.5)dy=11;else if(Math.sin(a)<-0.5)dy=-3;
            s+=`<text class="r-label" x="${p[0].toFixed(1)}" y="${(p[1]+dy).toFixed(1)}" text-anchor="${anc}" fill="${POSCOLOR[pos]}">${pos}</text>`;
            s+=`<text class="r-cnt" x="${p[0].toFixed(1)}" y="${(p[1]+dy+11).toFixed(1)}" text-anchor="${anc}">${counts[pos]||0}/${POSMAX[pos]}</text>`;}
          return s+'</svg>';
        }
        function animateRadarTo(from,to){
          const svg=document.querySelector('#radarwrap .radar'); if(!svg)return;
          const shape=svg.querySelector('.r-shape'), dots=svg.querySelectorAll('.r-dot'), dur=480, t0=performance.now();
          function step(now){
            const tt=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-tt,3);
            let pts=[];
            for(let i=0;i<RADAR_GEO.n;i++){const f=from[i]+(to[i]-from[i])*e;const p=radarPoint(i,f);pts.push(p[0].toFixed(1)+','+p[1].toFixed(1));if(dots[i]){dots[i].setAttribute('cx',p[0].toFixed(1));dots[i].setAttribute('cy',p[1].toFixed(1));}}
            shape.setAttribute('points',pts.join(' '));
            if(tt<1)requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        }
        function renderStatusView() {}

        /* ── Target Board ── */
        let targets = []; try { targets = JSON.parse(localStorage.getItem('ffdraft_targets') || '[]'); } catch (e) {}
        let dragId = null, dragSrc = null;
        function saveTargets() { try { localStorage.setItem('ffdraft_targets', JSON.stringify(targets)); } catch (e) {} }
        function pById(id) { return AVAILABLE.find(p => p.id === id); }
        function tbRow(p, cls, btn) {
            return `<div class="${cls}" draggable="true" data-id="${p.id}">
          <span class="tb-pos" style="background:${POSCOLOR[p.pos]}${LIGHTPOS[p.pos] ? ';color:#fff' : ''}">${p.pos}</span>
          <span class="tb-nm">${p.fn} ${p.ln}</span><span class="tb-meta">${p.nfl}</span>${btn}</div>`;
        }
        function renderResults() {
            const q = document.getElementById('tbSearch').value.trim().toLowerCase(), box = document.getElementById('tbResults');
            if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }
            const m = AVAILABLE.filter(p => !targets.includes(p.id) && (p.fn + ' ' + p.ln).toLowerCase().includes(q)).slice(0, 7);
            box.style.display = m.length ? 'block' : 'none';
            box.innerHTML = m.map(p => tbRow(p, 'tb-res', '<button class="tb-add" title="Add to targets">+</button>')).join('');
            box.querySelectorAll('.tb-res').forEach(el => {
                const id = +el.dataset.id;
                el.addEventListener('dragstart', e => { dragId = id; dragSrc = 'res'; e.dataTransfer.effectAllowed = 'copy'; e.dataTransfer.setData('text/plain', id); });
                el.querySelector('.tb-add').addEventListener('click', ev => { ev.stopPropagation(); addTarget(id); });
                el.addEventListener('click', () => addTarget(id));
            });
        }
        function addTarget(id) { if (!targets.includes(id)) { targets.push(id); saveTargets(); renderTargets(); } const s = document.getElementById('tbSearch'); s.value = ''; renderResults(); s.focus(); }
        function removeTarget(id) { targets = targets.filter(t => t !== id); saveTargets(); renderTargets(); }
        function renderTargets() {
            const box = document.getElementById('tbTargets');
            if (!targets.length) { box.innerHTML = '<div class="tb-empty">Search above and drag (or +) players here<br>to build your target list.</div>'; return; }
            box.innerHTML = targets.map((id, i) => { const p = pById(id); return p ? tbRow(p, 'tb-tgt', '<button class="tb-x" title="Remove">✕</button>').replace('<span class="tb-pos"', `<span class="tb-rank">${i + 1}</span><span class="tb-pos"`) : ''; }).join('');
            box.querySelectorAll('.tb-tgt').forEach(el => {
                const id = +el.dataset.id;
                el.addEventListener('dragstart', e => { dragId = id; dragSrc = 'tgt'; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); });
                el.querySelector('.tb-x').addEventListener('click', () => removeTarget(id));
            });
        }
        function tgtAfter(box, y) { return [...box.querySelectorAll('.tb-tgt')].find(r => { const b = r.getBoundingClientRect(); return y < b.top + b.height / 2; }); }
        function setupTargetBoard() {
            document.getElementById('tbSearch').addEventListener('input', renderResults);
            const box = document.getElementById('tbTargets');
            box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('drag-over'); box.querySelectorAll('.tb-tgt').forEach(r => r.classList.remove('drop-before')); const a = tgtAfter(box, e.clientY); if (a) a.classList.add('drop-before'); });
            box.addEventListener('dragleave', () => box.classList.remove('drag-over'));
            box.addEventListener('drop', e => {
                e.preventDefault(); box.classList.remove('drag-over');
                if (dragSrc === 'res') { addTarget(dragId); }
                else if (dragSrc === 'tgt') { const a = tgtAfter(box, e.clientY); targets = targets.filter(t => t !== dragId); const idx = a ? targets.indexOf(+a.dataset.id) : targets.length; targets.splice(idx < 0 ? targets.length : idx, 0, dragId); saveTargets(); renderTargets(); }
                dragId = null; dragSrc = null;
            });
            renderTargets();
        }

        /* hover tooltip */
        function showTip(e, i) {
            const p = curRoster[i], tip = document.getElementById('ptip');
            tip.style.setProperty('--pc', POSCOLOR[p.pos]);
            const rows = statCells(p).map(c => { const n=parseFloat(String(c[1]).replace(/,/g,'')); return `<div class="tt-stat"><span class="l">${c[0]}</span><span class="bar"><i style="width:${!isNaN(n) ? Math.min(n/c[2]*100,100) : 0}%"></i></span><span class="n tnum">${c[1]}</span></div>`; }).join('');
            tip.innerHTML = `<div class="tt-head"><span class="tt-pos ${LIGHTPOS[p.pos] ? 'light' : ''}" style="background:${POSCOLOR[p.pos]}">${p.pos}</span><span class="tt-name">${p.fn} ${p.ln}</span></div>
    <div class="tt-sub">${p.nfl} · Bye ${p.bye} · Drafted for <b style="color:var(--turf)">$${p.price}</b></div>${rows}`;
            tip.style.display = 'block'; moveTip(e);
        }
        function moveTip(e) {
            const tip = document.getElementById('ptip'); if (tip.style.display !== 'block') return;
            const w = tip.offsetWidth, h = tip.offsetHeight;
            let x = e.clientX + 18, y = e.clientY + 18;
            if (x + w > window.innerWidth - 8) x = e.clientX - w - 18;
            if (y + h > window.innerHeight - 8) y = window.innerHeight - h - 8;
            tip.style.left = x + 'px'; tip.style.top = Math.max(8, y) + 'px';
        }
        function hideTip() { document.getElementById('ptip').style.display = 'none'; }

        init();
    </script>
  </body>
</html>
